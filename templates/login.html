<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:'Inter', sans-serif;
            background: #0b1220;
        }

        /* soft gradient background */
        body::before{
            content:"";
            position:absolute;
            width:100%;
            height:100%;
            background:
                radial-gradient(circle at top left, rgba(59,130,246,0.25), transparent 40%),
                radial-gradient(circle at bottom right, rgba(168,85,247,0.25), transparent 40%);
            z-index:0;
        }

        /* login card */
        .login-box{
            position:relative;
            z-index:2;
            width:360px;
            padding:40px;

            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(18px);

            border:1px solid rgba(255,255,255,0.08);
            border-radius:18px;

            box-shadow:0 20px 60px rgba(0,0,0,0.5);

            animation: fadeUp 0.8s ease;
        }

        @keyframes fadeUp{
            from{opacity:0; transform:translateY(30px);}
            to{opacity:1; transform:translateY(0);}
        }

        /* title */
        h2{
            text-align:center;
            margin-bottom:25px;
            font-size:24px;
            font-weight:700;
            color:#e5e7eb;
            letter-spacing:1px;
        }

        /* inputs */
        input{
            width:100%;
            padding:14px;
            margin:10px 0;

            border-radius:10px;
            border:1px solid rgba(255,255,255,0.1);

            background: rgba(255,255,255,0.05);
            color:white;

            outline:none;
            transition:0.3s;
            font-size:14px;
        }

        input:focus{
            border-color:#3b82f6;
            box-shadow:0 0 0 3px rgba(59,130,246,0.2);
        }

        /* button */
        button{
            width:100%;
            padding:14px;
            margin-top:15px;

            border:none;
            border-radius:10px;

            background:#3b82f6;
            color:white;

            font-weight:600;
            cursor:pointer;

            transition:0.3s;
        }

        button:hover{
            background:#2563eb;
            transform:translateY(-2px);
            box-shadow:0 10px 25px rgba(59,130,246,0.25);
        }

        /* footer */
        .footer{
            text-align:center;
            margin-top:15px;
            font-size:12px;
            color:rgba(255,255,255,0.5);
        }

    </style>
</head>

<body>

<div class="login-box">

    <h2>Welcome Back</h2>

    <form method="POST">
        <input name="name" placeholder="Enter Name" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Sign In</button>
    </form>

    <div class="footer">
        Secure Access • Ganpati System
    </div>

</div>

</body>
</html>
