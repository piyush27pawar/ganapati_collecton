<!DOCTYPE html>
<html>
<head>
    <title>Visitors Dashboard</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');

        body{
            margin:0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top,#050816,#02040a);
            color:white;
            overflow-x:hidden;
        }

        /* 🌟 HEADER */
        h1{
            text-align:center;
            font-size:40px;
            margin-top:20px;
            font-family:'Orbitron',sans-serif;
            background: linear-gradient(90deg,#60a5fa,#a78bfa,#22d3ee,#f472b6);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            animation: glow 2s infinite alternate, float 1.5s ease-in-out infinite;
        }

        p{
            text-align:center;
            opacity:0.7;
            animation: fadeIn 1s ease;
        }

        /* 📦 CONTAINER */
        .box{
            width:80%;
            margin:30px auto;
            background: rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:20px;
            box-shadow:0 0 40px rgba(59,130,246,0.2);
            overflow:hidden;
            animation: slideUp 1s ease;
        }

        /* 📊 TABLE */
        table{
            width:100%;
            border-collapse:collapse;
        }

        th, td{
            padding:15px;
            text-align:center;
            border-bottom:1px solid rgba(255,255,255,0.08);
            font-size:16px;
        }

        th{
            background: rgba(255,255,255,0.08);
            color:#93c5fd;
            font-size:18px;
            letter-spacing:1px;
        }

        tr{
            transition:0.3s;
            animation: rowIn 0.6s ease;
        }

        tr:hover{
            background: rgba(59,130,246,0.12);
            transform:scale(1.01);
        }

        /* 🔥 TOP STATS */
        .stats{
            display:flex;
            justify-content:center;
            gap:20px;
            margin-top:20px;
            flex-wrap:wrap;
        }

        .card{
            width:200px;
            padding:20px;
            border-radius:15px;
            background: rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.08);
            text-align:center;
            box-shadow:0 0 20px rgba(0,0,0,0.4);
            animation: pop 0.8s ease;
            transition:0.4s;
        }

        .card:hover{
            transform:translateY(-10px) scale(1.05);
            box-shadow:0 0 30px rgba(99,102,241,0.4);
        }

        .number{
            font-size:30px;
            font-weight:bold;
            color:#22d3ee;
        }

        /* ✨ ANIMATIONS */
        @keyframes glow{
            from{filter:drop-shadow(0 0 10px #3b82f6);}
            to{filter:drop-shadow(0 0 25px #a78bfa);}
        }

        @keyframes float{
            0%{transform:translateY(0);}
            50%{transform:translateY(-6px);}
            100%{transform:translateY(0);}
        }

        @keyframes fadeIn{
            from{opacity:0;}
            to{opacity:1;}
        }

        @keyframes slideUp{
            from{opacity:0; transform:translateY(40px);}
            to{opacity:1; transform:translateY(0);}
        }

        @keyframes rowIn{
            from{opacity:0; transform:translateX(-10px);}
            to{opacity:1; transform:translateX(0);}
        }

        @keyframes pop{
            from{transform:scale(0.7); opacity:0;}
            to{transform:scale(1); opacity:1;}
        }

        /* 🌌 BACKGROUND EFFECT */
        .bg-circle{
            position:absolute;
            width:300px;
            height:300px;
            background: rgba(59,130,246,0.2);
            border-radius:50%;
            filter:blur(80px);
            animation: move 6s infinite alternate;
        }

        @keyframes move{
            from{transform:translate(0,0);}
            to{transform:translate(200px,100px);}
        }

    </style>
</head>

<body>

<div class="bg-circle"></div>

<h1>VISITORS ANALYTICS</h1>
<p>Live User Tracking Dashboard</p>

<!-- STATS -->
<div class="stats">
    <div class="card">
        <div class="number">{{visitors|length}}</div>
        Total Visitors
    </div>
</div>

<!-- TABLE -->
<div class="box">
<table>
    <tr>
        <th>#</th>
        <th>User Name</th>
        <th>Status</th>
    </tr>

    {% for v in visitors %}
    <tr>
        <td>{{loop.index}}</td>
        <td>{{v[0]}}</td>
        <td>Active</td>
    </tr>
    {% endfor %}

</table>
</div>

</body>
</html>
